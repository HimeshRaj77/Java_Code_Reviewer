# Root logger option
handlers=java.util.logging.FileHandler, java.util.logging.ConsoleHandler
.level=INFO

# File logging
java.util.logging.FileHandler.pattern=logs/codereviewer-%g.log
java.util.logging.FileHandler.limit=50000000
java.util.logging.FileHandler.count=7
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.level=INFO

# Console logging
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Application specific logging
com.reviewer.codereviewer.level=INFO
com.reviewer.codereviewer.service.level=INFO
com.reviewer.codereviewer.controller.level=INFO

# Format for SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS %4$s %2$s %5$s%6$s%n
