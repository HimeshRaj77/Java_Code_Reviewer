# Application Configuration
spring.application.name=CodeReviewer
application.version=${project.version}
application.title=Java Code Reviewer

# Logging Configuration
logging.level.root=INFO
logging.level.com.reviewer.codereviewer=INFO
logging.config=classpath:logging.properties

# Code Analysis Configuration
app.analysis.max-method-length=50
app.analysis.max-cyclomatic-complexity=10
app.analysis.enable-extended-review=true

# Load private configuration (copy application-private.properties.template to application-private.properties)
spring.config.import=optional:classpath:/config/application-private.properties